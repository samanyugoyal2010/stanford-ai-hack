<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nudge | AI learning assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="deck" class="deck" aria-label="Nudge keynote presentation">
    <div id="track" class="track"></div>
    <aside class="hud" aria-hidden="true">
      <div class="hud-brand">
        <span class="brand-mark">N</span>
        <span class="brand-name">Nudge</span>
      </div>
      <div id="progress" class="progress">01 / 12</div>
      <div id="dots" class="dots"></div>
    </aside>
  </main>
  <script type="module" src="renderer.js"></script>
</body>
</html>
