name: Release

# Push a tag like v0.1.0 → fully automatic release. Builds the Mac + Windows
# installers on their native runners, uploads them to a draft GitHub Release named
# after the tag, then (once BOTH succeed) publishes it so it's downloadable. No
# manual step. If either build fails the release stays a draft (nothing goes live).
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # electron-builder needs this to create the release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: mac
          - os: windows-latest
            name: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      # Reads the pnpm version from package.json "packageManager" — no pin to drift.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The git tag is the single source of truth for the version. Stamp it into
      # the desktop package.json so electron-builder names the installers and
      # app.getVersion() (shown in the UI) both report the released version — no
      # manual package.json bump needed.
      - name: Set version from tag
        shell: bash
        run: |
          export V="${GITHUB_REF_NAME#v}"
          node -e "const f='apps/desktop/package.json';const fs=require('fs');const p=JSON.parse(fs.readFileSync(f));p.version=process.env.V;fs.writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
          echo "Building version $V"

      # Assemble the Next standalone server + the agent bundle into dist/ (these
      # are what Electron packages as unpacked resources).
      - name: Pack web + agent
        run: |
          pnpm --filter @openlive/desktop pack:web
          pnpm --filter @openlive/desktop pack:agent

      # Apple's notary service is intermittently flaky (returns empty/unexpected
      # results). Retry a few times so a transient notarization blip doesn't fail
      # the whole release; electron-builder overwrites its own assets on republish.
      - name: Build & publish (macOS — signed + notarized)
        if: matrix.name == 'mac'
        shell: bash
        run: |
          for i in 1 2 3; do
            pnpm --filter @openlive/desktop exec electron-builder --mac --publish always && exit 0
            echo "::warning::electron-builder attempt $i failed (likely flaky notarization); retrying in 30s…"
            sleep 30
          done
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing (skipped automatically if these are unset):
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Notarization (skipped automatically if these are unset):
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build & publish (Windows)
        if: matrix.name == 'win'
        run: pnpm --filter @openlive/desktop exec electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Both platforms uploaded their assets to the draft release. Flip it to
  # published (and mark it "Latest") so it's downloadable. Runs only if every
  # build succeeded, so a half-built release never goes public.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Need the repo checked out to read CHANGELOG.md for the release highlights.
      - uses: actions/checkout@v4

      # Give users a clean release: this version's CHANGELOG highlights, a download
      # table pointing at the two installers, and strip the *.blockmap noise. The
      # *.yml + mac *.zip stay — auto-update (electron-updater) needs them.
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          BASE="https://github.com/$REPO/releases/download/$TAG"
          # Best-effort: pull this tag's section out of CHANGELOG.md. Empty if the
          # file or section is missing — the release still publishes with the table.
          HIGHLIGHTS=""
          if [ -f CHANGELOG.md ]; then
            HIGHLIGHTS=$(awk -v v="${TAG#v}" 'index($0,"## ["v"]")==1{f=1;print;next} f&&/^## \[/{exit} f&&/^\[.*\]: /{exit} f{print}' CHANGELOG.md || true)
          fi
          NOTES="## Download OpenLive ${TAG}

          | Platform | Download |
          | --- | --- |
          | 🍎 **macOS** (Apple Silicon + Intel) | [\`${TAG}\` — Mac (.dmg)](${BASE}/OpenLive-${TAG#v}-mac.dmg) |
          | 🪟 **Windows** (64-bit) | [\`${TAG}\` — Windows (.exe)](${BASE}/OpenLive-${TAG#v}-windows.exe) |

          On first launch macOS may take a few seconds to verify the app — that's normal.
          "
          if [ -n "$HIGHLIGHTS" ]; then
            NOTES="${NOTES}
          ---

          ${HIGHLIGHTS}"
          fi
          gh release edit "$TAG" --repo "$REPO" --draft=false --latest --notes "$NOTES"
          for a in $(gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' | grep -E '\.blockmap$'); do
            gh release delete-asset "$TAG" "$a" --yes --repo "$REPO" || true
          done
