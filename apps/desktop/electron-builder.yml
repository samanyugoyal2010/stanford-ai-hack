appId: com.openlive.desktop
productName: OpenLive
copyright: © OpenLive

directories:
  output: release
  buildResources: build

# Where `--publish` uploads and where auto-update metadata (latest.yml /
# latest-mac.yml) points. electron-builder creates a *draft* GitHub Release named
# v<version> and attaches the installers; you publish it from the Releases page.
publish:
  provider: github
  owner: katipally
  repo: openlive

# Only the shell code goes in the asar; the servers ride along as unpacked
# resources (they're spawned as child Node processes).
files:
  - main.cjs
  - preload.cjs
  - splash.html

extraResources:
  - from: dist/web
    to: web
  - from: dist/agent
    to: agent

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  # One universal DMG (Apple Silicon + Intel in a single file) so users don't have
  # to know their chip — just "download for Mac". The zip is what auto-update pulls
  # (electron-updater can't update from a .dmg); users never touch it.
  target:
    - target: dmg
      arch: [universal]
    - target: zip
      arch: [universal]
  artifactName: ${productName}-${version}-mac.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  icon: build/icon.png
  extendInfo:
    NSMicrophoneUsageDescription: OpenLive listens to your microphone to hear you speak.
    NSCameraUsageDescription: OpenLive uses your camera so the assistant can see what you show it.
    LSMinimumSystemVersion: "11.0"

# Signing + notarization are fully env-driven, so nothing here needs toggling:
#   - Signing: set CSC_LINK (base64 .p12 Developer ID Application cert) + CSC_KEY_PASSWORD.
#   - Notarization: set APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID.
# When those are absent (local dev), electron-builder skips both and produces an
# unsigned .dmg. In CI they come from GitHub Secrets — see .github/workflows/release.yml.

dmg:
  title: OpenLive
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-${version}-windows.${ext}
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
